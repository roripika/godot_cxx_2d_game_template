# branching_basic spec fixture
# scenarios/generated/branching_basic_expected_output.yaml と同じ出力を生成する spec。
# 推奨構成（goal + label + location 全指定）
template: branching_basic
scenario_name: museum_heist

goal:
  clear_condition: |
    指紋と目撃証言が両方揃えば逮捕できる
  fail_condition: |
    どちらか一方でも欠けていたら釈放になる

branches:
  - id: fingerprint
    label: 「指紋」カード
    location: display_case
  - id: testimony
    label: 「目撃証言」カード
    location: security_desk

check_type: all_of

scenes:
  start:          investigation
  terminal_clear: arrest_scene
  terminal_fail:  release_scene
