[preset.0]
name="macOS"
platform="macOS"
runnable=true
custom_features=""
export_filter="all_resources"
export_path="builds/macOS/App.zip"

[preset.0.options]
texture_format/bptc=true
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false
application/name="$APP_NAME"

