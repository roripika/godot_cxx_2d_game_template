start_scene: "prologue"

scenes:
  prologue:
    mode: "investigation"
    scene_path: "res://samples/mystery/office_base.tscn"
    on_enter:
      - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.prologue.system" }
      - transition_object: { target: "yui", type: "fade_in", duration: 0.8, mode: "in" }
      - dialogue: { speaker_key: "speaker.yui", speaker: "Yui", text_key: "mystery.prologue.yui_intro", portrait_side: "right" }
      - transition_object: { target: "detective", type: "slide_right", duration: 0.5, mode: "in" }
      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.prologue.detective_intro", portrait_side: "left" }
      - transition_object: { target: "boss", type: "wipe_radial_cw", duration: 0.8, mode: "in" }
      - dialogue: { speaker_key: "speaker.boss", speaker: "Ken", text_key: "mystery.prologue.boss_call", portrait_side: "right" }
      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.prologue.detective_ack", portrait_side: "left" }
      - goto:
          scene_id: "warehouse_investigation"
          fade_duration: 1.0
          transition_type: "split_cols"

  warehouse_investigation:
    mode: "investigation"
    scene_path: "res://samples/mystery/warehouse_base.tscn"
    on_enter:
      - transition_object: { target: "detective", type: "jump_zoom", duration: 0.5, mode: "in" }
      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.intro" }

    hotspots:
      tanaka_spot:
        node_id: "hs_manager"
        on_click:
          - if_flag:
              key: "talked_to_tanaka"
              value: true
              then:
                - dialogue: { speaker_key: "speaker.tanaka", speaker: "Tanaka", text_key: "mystery.warehouse.tanaka.talk2", portrait_side: "right" }
              else:
                - dialogue: { speaker_key: "speaker.tanaka", speaker: "Tanaka", text_key: "mystery.warehouse.tanaka.talk", portrait_side: "right", portrait_enter: "slide_in_right" }
                - dialogue: { speaker_key: "speaker.tanaka", speaker: "Tanaka", text_key: "mystery.warehouse.tanaka.response", portrait_enter: "shake" }
                - set_flag: { key: "talked_to_tanaka", value: true }

      sato_spot:
        node_id: "hs_worker"
        on_click:
          - if_flag:
              key: "talked_to_sato"
              value: true
              then:
                - dialogue: { speaker_key: "speaker.sato", speaker: "Sato", text_key: "mystery.warehouse.sato.talk2", portrait_side: "right" }
              else:
                - dialogue: { speaker_key: "speaker.sato", speaker: "Sato", text_key: "mystery.warehouse.sato.talk", portrait_side: "right", portrait_enter: "slide_in_right" }
                - dialogue: { speaker_key: "speaker.sato", speaker: "Sato", text_key: "mystery.warehouse.sato.response", portrait_enter: "zoom_in" }
                - give_evidence: "ectoplasm"
                - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.warehouse.sato.got_ecto" }
                - set_flag: { key: "found_ecto", value: true }
                - set_flag: { key: "talked_to_sato", value: true }

      suzuki_spot:
        node_id: "hs_delivery"
        on_click:
          - if_flag:
              key: "talked_to_suzuki"
              value: true
              then:
                - dialogue: { speaker_key: "speaker.suzuki", speaker: "Suzuki", text_key: "mystery.warehouse.suzuki.talk2", portrait_side: "right" }
              else:
                - dialogue: { speaker_key: "speaker.suzuki", speaker: "Suzuki", text_key: "mystery.warehouse.suzuki.talk", portrait_side: "right", portrait_enter: "fade_in" }
                - dialogue: { speaker_key: "speaker.suzuki", speaker: "Suzuki", text_key: "mystery.warehouse.suzuki.response" }
                - give_evidence: "torn_memo"
                - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.warehouse.suzuki.got_memo" }
                - give_evidence: "delivery_log"
                - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.warehouse.suzuki.got_log" }
                - set_flag: { key: "talked_to_suzuki", value: true }

      kenta_spot:
        node_id: "hs_kenta"
        on_click:
          - if_flag:
              key: "talked_to_kenta"
              value: true
              then:
                - dialogue: { speaker_key: "speaker.kenta", speaker: "Kenta", text_key: "mystery.warehouse.kenta.talk2", portrait_side: "right" }
              else:
                - dialogue: { speaker_key: "speaker.kenta", speaker: "Kenta", text_key: "mystery.warehouse.kenta.talk", portrait_side: "right", portrait_enter: "slide_in_right" }
                - dialogue: { speaker_key: "speaker.kenta", speaker: "Kenta", text_key: "mystery.warehouse.kenta.response", portrait_enter: "shake" }
                - give_evidence: "witness_report"
                - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.warehouse.kenta.got_report" }
                - set_flag: { key: "talked_to_kenta", value: true }

      footprint_spot:
        node_id: "hs_footprints"
        on_click:
          - if_flag:
              key: "talked_to_tanaka"
              value: true
              then:
                - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.footprint.found", portrait_enter: "zoom_in" }
                - give_evidence: "footprint"
                - dialogue: { speaker_key: "speaker.system", speaker: "System", text_key: "mystery.warehouse.footprint.got" }
              else:
                - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.footprint.observe" }

      exit_spot:
        node_id: "hs_exit"
        on_click:
          - if_has_items:
              items: ["ectoplasm", "footprint", "torn_memo", "delivery_log", "witness_report"]
              then:
                - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.exit.ready", portrait_enter: "fade_in" }
                - goto:
                    scene_id: "deduction"
                    fade_duration: 1.0
                    transition_type: "wipe_radial_cw"
              else:
                - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.exit.not_ready" }
                - if_has_items:
                    items: ["footprint"]
                    else:
                      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.exit.hint.footprint" }
                - if_has_items:
                    items: ["ectoplasm"]
                    else:
                      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.exit.hint.ecto" }
                - if_has_items:
                    items: ["torn_memo", "delivery_log", "witness_report"]
                    else:
                      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.warehouse.exit.hint.others" }

  deduction:
    mode: "deduction"
    scene_path: "res://samples/mystery/office_base.tscn"
    on_enter:
      - transition_object: { target: "boss", type: "fade_in", duration: 0.5, mode: "in" }
      - dialogue: { speaker_key: "speaker.boss", speaker: "Ken", text_key: "mystery.deduction.question", portrait_side: "right", portrait_enter: "shake" }
      - choice:
          choices:
            - option:
                text_key: "mystery.deduction.choice.ghost"
                actions:
                  - dialogue: { speaker_key: "speaker.boss", speaker: "Ken", text_key: "mystery.deduction.ghost.response1", portrait_enter: "zoom_in" }
                  - goto:
                      scene_id: "confrontation"
                      fade_duration: 1.0
                      transition_type: "cross_fade"
            - option:
                text_key: "mystery.deduction.choice.human"
                actions:
                  - dialogue: { speaker_key: "speaker.system", text_key: "mystery.deduction.wrong.shake", portrait_enter: "shake" }
                  - dialogue: { speaker_key: "speaker.boss", speaker: "Ken", text_key: "mystery.deduction.wrong.text", portrait_enter: "shake" }
                  - take_damage: 1
                  - goto: "deduction"

  confrontation:
    mode: "confrontation"
    scene_path: "res://samples/mystery/warehouse_base.tscn"
    on_enter:
      - transition_object: { target: "detective", type: "slide_right", duration: 0.5, mode: "in" }
      - dialogue: { speaker_key: "speaker.detective", speaker: "Ren", text_key: "mystery.confrontation.start1" }
      - transition_object: { target: "rat_witness", type: "jump_zoom", duration: 0.6, mode: "in" }
      - dialogue: { speaker_key: "speaker.rat_witness", speaker: "Rat Witness", text_key: "mystery.confrontation.start2" }
      - testimony:
          max_rounds: 3
          testimonies:
            -
              speaker_key: "speaker.rat_witness"
              speaker: "Rat Witness"
              text_key: "mystery.testimony.line1"
              shake_key: "mystery.testimony.line1.shake"
              hint_key: "mystery.testimony.line1.hint"
            -
              speaker_key: "speaker.rat_witness"
              speaker: "Rat Witness"
              text_key: "mystery.testimony.line2"
              evidence: "footprint"
              shake_key: "mystery.testimony.line2.shake"
              hint_key: "mystery.testimony.line2.hint"
            -
              speaker_key: "speaker.rat_witness"
              speaker: "Rat Witness"
              text_key: "mystery.testimony.line3"
              evidence: "witness_report"
              shake_key: "mystery.testimony.line3.shake"
              hint_key: "mystery.testimony.line3.hint"
          on_success:
            - dialogue: { speaker_key: "speaker.rat_witness", speaker: "Rat Witness", text_key: "mystery.confrontation.success" }
            - goto: "ending_good"
          on_failure:
            - goto: "ending_bad"

  ending_good:
    mode: "ending"
    scene_path: "res://samples/mystery/ending_base.tscn"
    on_enter:
      - dialogue: { speaker_key: "speaker.system", text_key: "mystery.ending.good1" }

  ending_bad:
    mode: "ending"
    scene_path: "res://samples/mystery/ending_base.tscn"
    on_enter:
      - dialogue: { speaker_key: "speaker.system", text_key: "mystery.ending.bad1" }
