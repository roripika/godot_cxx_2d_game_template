# Generated by gen_scenario_event_driven.py  [2026-04-01 17:34:55]
# scenario_name: billiards_clear
# template:      event_driven_basic
#
# ── billiards_test Task データフロー ────────────────────────────────────
# setup_billiards_round → round:shots_taken=0, round:shot_limit, round:target_count
# wait_for_billiards_event  → TaskResult::Waiting ループ → timeout → event:last_name='balls_stopped'
# record_billiards_event    → イベント名に応じて WorldState フラグ更新
# evaluate_billiards_round  → cue_foul > pocketed >= target > shots >= limit の優先順で判定
#
# setup.shot_limit:   2
# setup.target_count: 1
# wait_events:        ['balls_stopped']
# wait_timeout:       0.1
# boot_records:       ['shot_committed', 'ball_pocketed']
# continue_records:   (なし)
# continue_scene:     shoot_again
# terminal_clear:     victory  (result: solved)
# terminal_fail:      defeat  (result: failed)
#
# ── pos-0 sacrifice 適用ルール（R-8/R-9/R-10 確定） ────────────────────
# setup_round (boot):   sacrifice 不要（_ready() 経由, index=0 から実行）
# shoot_again:  pos-0 sacrifice 必要（evaluate → load_scene → index++ → skip）
# victory / defeat: pos-0 sacrifice 必要（同上）
#
# ── フロー概要 ──────────────────────────────────────────────────────────
# setup_round
#   └─ setup_billiards_round
#   └─ wait_for_billiards_event(timeout) → balls_stopped
#   └─ record_billiards_event(shot_committed)
#   └─ record_billiards_event(ball_pocketed)
#   └─ evaluate_billiards_round
#        ├── if_clear    → victory
#        ├── if_fail     → defeat
#        └── if_continue → shoot_again
# shoot_again  (pos-0 sacrificed)
#   └─ [sacrifice] wait_for_billiards_event
#   └─ [actual]    wait_for_billiards_event(timeout) → balls_stopped
#   └─ evaluate_billiards_round (同様の3分岐)
# victory / defeat  (pos-0 sacrificed)
#   └─ [sacrifice] end_game
#   └─ [actual]    end_game
start_scene: setup_round

scenes:

  # 1. boot（_ready() 起動; pos-0 sacrifice 不要） ─────────────────────
  setup_round:
    on_enter:
      - action: setup_billiards_round
        payload:
          shot_limit:   2
          target_count: 1

      - action: wait_for_billiards_event
        payload:
          events:  [balls_stopped]
          timeout: 0.1

      - action: record_billiards_event
        payload:
          event: shot_committed

      - action: record_billiards_event
        payload:
          event: ball_pocketed

      - action: evaluate_billiards_round
        payload:
          if_clear:    victory
          if_fail:     defeat
          if_continue: shoot_again

  # 2. continue ループ（pos-0 sacrifice 適用） ─────────────────────────
  shoot_again:
    on_enter:
      - action: wait_for_billiards_event  # pos-0 sacrifice（スキップされる）
        payload:
          events:  [balls_stopped]
          timeout: 0.1

      - action: wait_for_billiards_event  # 実際に実行される
        payload:
          events:  [balls_stopped]
          timeout: 0.1

      - action: evaluate_billiards_round
        payload:
          if_clear:    victory
          if_fail:     defeat
          if_continue: shoot_again

  # 3. clear terminal（pos-0 sacrifice 適用） ─────────────────────────
  victory:
    on_enter:
      - action: end_game  # pos-0 sacrifice（スキップされる）
        payload: {result: solved}

      - action: end_game  # 実際に実行される
        payload: {result: solved}

  # 4. fail terminal（pos-0 sacrifice 適用） ──────────────────────────
  defeat:
    on_enter:
      - action: end_game  # pos-0 sacrifice（スキップされる）
        payload: {result: failed}

      - action: end_game  # 実際に実行される
        payload: {result: failed}
