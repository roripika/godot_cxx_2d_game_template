# turn_grid_basic_expected_output.yaml
# このファイルは gen_scenario_turn_grid.py の期待出力サンプルです。
# validate_scenario.py exit 0 確認済み（Phase 3-C T12）。
# 入力 Structured Spec: docs/generator_spec_schema.md T12-7「最小 Spec 例」に対応。
#
# Generated by tools/gen_scenario_turn_grid.py
# HG-2: シーン構成・Task 列を確認し review.md の指示に従ってください

start_scene: boot

scenes:

  # boot: ターンループシーン
  # - 初回(_ready()経由): setup_roguelike_round が pos-0 から実行される
  # - ループ時: setup_roguelike_round(pos-0)はスキップ → 前ターンの状態が保持される
  # pos-0 sacrifice は不要（R-1 HG-4 smoke 確認済み）
  boot:
    on_enter:
      - action: setup_roguelike_round
        payload:
          player_hp: 3
          enemy_hp:  2

      - action: load_fake_player_command
        payload:
          command: attack

      - action: apply_player_attack
        payload:
          target: enemy_1

      - action: apply_enemy_turn

      - action: resolve_roguelike_turn

      - action: evaluate_roguelike_round
        payload:
          if_clear:    victory
          if_fail:     defeat
          if_continue: boot

  victory:
    on_enter:
      - action: end_game          # pos-0 sacrifice
        payload: {result: solved}
      - action: end_game
        payload: {result: solved}

  defeat:
    on_enter:
      - action: end_game          # pos-0 sacrifice
        payload: {result: failed}
      - action: end_game
        payload: {result: failed}
