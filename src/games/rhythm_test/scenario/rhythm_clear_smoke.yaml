# rhythm_clear_smoke.yaml
# NOTE: Each non-boot scene has a duplicate of its first meaningful task at
# position 0. This is a workaround for ScenarioRunner's scene-transition
# behaviour: when evaluate_rhythm_round calls load_scene_by_id(), the
# pending_action_index is reset to 0 by start_actions(), then immediately
# incremented to 1 by step_actions() after execute() returns Success.
# The pos-0 task is therefore always skipped on entry from a transition.
# Duplicating the task ensures the real work still runs at pos 1+.
start_scene: boot

scenes:
  boot:
    on_enter:
      - action: setup_rhythm_round
        payload:
          notes: [1000, 2000, 3000]
          taps: [1000, 2000, 3000]
          advance_ms: 1000
          clear_hit_count: 3
          max_miss_count: 0
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance

  advance:
    on_enter:
      - action: advance_rhythm_clock  # pos 0 - sacrificed (always skipped)
      - action: advance_rhythm_clock  # pos 1 - real
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: judge

  judge:
    on_enter:
      - action: load_fake_tap          # pos 0 - sacrificed
      - action: load_fake_tap          # pos 1 - real
      - action: judge_rhythm_note
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: resolve

  resolve:
    on_enter:
      - action: resolve_rhythm_progress  # pos 0 - sacrificed
      - action: resolve_rhythm_progress  # pos 1 - real
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: check_round

  check_round:
    on_enter:
      - action: evaluate_rhythm_round  # pos 0 - sacrificed
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance
      - action: evaluate_rhythm_round  # pos 1 - real
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance

  clear:
    on_enter:
      - action: end_game
        payload:
          result: solved

  fail:
    on_enter:
      - action: end_game
        payload:
          result: failed
