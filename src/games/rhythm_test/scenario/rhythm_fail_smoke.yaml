# rhythm_fail_smoke.yaml
# NOTE: pos-0 sacrifice pattern - see rhythm_clear_smoke.yaml for explanation.
start_scene: boot

scenes:
  boot:
    on_enter:
      - action: setup_rhythm_round
        payload:
          notes: [1000, 2000, 3000]
          taps: [-1, -1, -1]
          advance_ms: 1200
          clear_hit_count: 3
          max_miss_count: 1
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance

  advance:
    on_enter:
      - action: advance_rhythm_clock  # pos 0 - sacrificed
      - action: advance_rhythm_clock  # pos 1 - real
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: judge

  judge:
    on_enter:
      - action: load_fake_tap          # pos 0 - sacrificed
      - action: load_fake_tap          # pos 1 - real
      - action: judge_rhythm_note
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: resolve

  resolve:
    on_enter:
      - action: resolve_rhythm_progress  # pos 0 - sacrificed
      - action: resolve_rhythm_progress  # pos 1 - real
      - action: evaluate_rhythm_round
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: check_round

  check_round:
    on_enter:
      - action: evaluate_rhythm_round  # pos 0 - sacrificed
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance
      - action: evaluate_rhythm_round  # pos 1 - real
        payload:
          if_clear: clear
          if_fail: fail
          if_continue: advance

  clear:
    on_enter:
      - action: end_game
        payload:
          result: solved

  fail:
    on_enter:
      - action: end_game
        payload:
          result: failed
