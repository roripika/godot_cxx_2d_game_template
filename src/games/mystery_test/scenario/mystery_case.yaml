start_scene: start

scenes:
  start:
    on_enter:
      - action: show_dialogue
        payload:
          speaker: narrator
          text: "屋敷のキッチンで調査を開始する..."

      - action: discover_evidence
        payload:
          id: knife
          location: kitchen

      - action: show_dialogue
        payload:
          speaker: detective
          text: "血のついた包丁を見つけた。さらに奥を調べよう。"

      # Timeout Test: ユーザーの入力を待つ（擬似）
      - action: wait_for_signal
        payload:
          signal: user_confirm
          timeout: 3.0

      - action: discover_evidence
        payload:
          id: fingerprint
          location: handle

      - action: show_dialogue
        payload:
          speaker: detective
          text: "指紋も検出した。これで条件は揃ったはずだ。"

      # Multi-Condition Logic Test
      - action: check_condition
        payload:
          all_of:
            - evidence: knife
            - evidence: fingerprint
          if_true: accuse_chef
          if_false: accuse_butler

  accuse_chef:
    on_enter:
      - action: show_dialogue
        payload:
          speaker: detective
          text: "包丁と指紋が一致した。犯人は料理人だ！"

      - action: end_game
        payload:
          result: solved

  accuse_butler:
    on_enter:
      - action: show_dialogue
        payload:
          speaker: detective
          text: "証拠が不十分だ...執事が怪しいが決め手がない。"

      - action: end_game
        payload:
          result: wrong
